<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#6366f1"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>PropMap — Offline</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Outfit',system-ui,sans-serif;
      background:#0f0f1a;
      color:#e2e8f0;
      min-height:100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .card{
      background:#1a1a2e;
      border:1px solid #2d2d44;
      border-radius:20px;
      padding:48px 36px;
      max-width:400px;
      width:100%;
      text-align:center;
    }
    .icon{
      font-size:64px;
      margin-bottom:20px;
      display:block;
    }
    h1{
      font-size:24px;
      font-weight:700;
      color:#6366f1;
      margin-bottom:10px;
    }
    p{
      font-size:15px;
      color:#94a3b8;
      line-height:1.6;
      margin-bottom:28px;
    }
    .btn{
      display:inline-block;
      background:#6366f1;
      color:#fff;
      font-size:15px;
      font-weight:600;
      padding:12px 28px;
      border-radius:12px;
      border:none;
      cursor:pointer;
      text-decoration:none;
      transition:background .2s;
    }
    .btn:hover{background:#4f46e5}
    .status{
      margin-top:20px;
      font-size:13px;
      color:#64748b;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">📡</span>
    <h1>Sedang Offline</h1>
    <p>
      Kamu tidak terhubung ke internet saat ini.<br/>
      Periksa koneksi dan coba lagi.
    </p>
    <button class="btn" onclick="tryReload()">Coba Lagi</button>
    <p class="status" id="statusMsg"></p>
  </div>

  <script>
    function tryReload() {
      const msg = document.getElementById('statusMsg');
      msg.textContent = 'Mengecek koneksi…';
      fetch('/manifest.json', { method: 'HEAD', cache: 'no-store' })
        .then(() => { window.location.href = '/'; })
        .catch(() => { msg.textContent = 'Masih offline. Coba lagi sebentar.'; });
    }

    // Auto-retry setiap 10 detik
    setInterval(() => {
      fetch('/manifest.json', { method: 'HEAD', cache: 'no-store' })
        .then(() => { window.location.href = '/'; })
        .catch(() => {});
    }, 10000);
  </script>
</body>
</html>
